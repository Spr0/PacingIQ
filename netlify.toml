# Netlify build + SPA routing config for PacingIQ
[build]
  command = "npm run build"
  publish = "dist"

# Serverless functions (AI Coaching Assistant). Requires two environment
# variables set in the Netlify site settings:
#   ANTHROPIC_API_KEY  - your Anthropic API key
#   ANTHROPIC_MODEL    - e.g. claude-opus-4-8 (no default; missing config fails loudly)
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Function routes are resolved before redirects, so the SPA catch-all below does
# not shadow /.netlify/functions/*.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
